services:
  app:
    build: .
    image: stock-intelligence:latest
    container_name: stock_intelligence
    restart: unless-stopped
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      # The long-running worker service owns scheduled jobs in compose mode.
      ENABLE_STREAMLIT_SCHEDULER: "0"
    volumes:
      # One shared runtime volume keeps auth.db, users.db, alerts.db, settings, and caches together.
      - stock_data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  worker:
    image: stock-intelligence:latest
    container_name: stock_intelligence_worker
    restart: unless-stopped
    command: ["python", "-m", "src.scheduler.worker"]
    healthcheck:
      disable: true
    env_file:
      - .env
    depends_on:
      app:
        condition: service_healthy
    volumes:
      - stock_data:/app/data

volumes:
  stock_data:
    driver: local
