repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace

  - repo: local
    hooks:
      - id: contrast-check
        name: contrast check
        entry: python scripts/check_contrast.py
        language: system
        pass_filenames: false
