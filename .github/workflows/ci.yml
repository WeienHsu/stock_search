name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run tests
        run: pytest -q
      - name: Run contrast check
        run: python scripts/check_contrast.py

  a11y-audit:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          npm install -g @axe-core/cli
      - name: Start Streamlit
        run: |
          streamlit run app.py --server.headless=true --server.port=8501 > logs_a11y_streamlit.log 2>&1 &
      - name: Wait for Streamlit
        run: |
          python - <<'PY'
          import time
          from urllib.request import urlopen

          deadline = time.time() + 60
          while time.time() < deadline:
              try:
                  with urlopen("http://localhost:8501", timeout=2):
                      raise SystemExit(0)
              except Exception:
                  time.sleep(1)
          raise SystemExit("Streamlit did not start within 60s")
          PY
      - name: Run axe accessibility audit
        run: python scripts/run_a11y_audit.py --base-url http://localhost:8501
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: a11y-audit
          path: |
            logs/a11y_audit_*.json
            logs/a11y_audit_*.md
            logs/a11y_axe_*.json
            logs_a11y_streamlit.log
